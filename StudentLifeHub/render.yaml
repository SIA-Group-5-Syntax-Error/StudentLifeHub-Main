services:
  - type: web
    name: student-life-hub-api
    runtime: php            
    plan: free
    buildCommand: |
      cd StudentLifeHub && composer install --no-dev --optimize-autoloader
    startCommand: |
      cd StudentLifeHub && apache2-foreground
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"